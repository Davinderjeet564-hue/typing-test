<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="typing-container.css" />
    <link rel="stylesheet" href="topbar.css" />
    <link rel="stylesheet" href="settings-sidebar.css" />
    <link rel="stylesheet" href="stats.css" />
    <link rel="stylesheet" href="time-display.css" />
  </head>
  <body>
    <main>
      <div class="top-bar">
        <section class="header">
          <h1 class="title">Typing Test</h1>
          <p class="description">Test your typing speed and accuracy</p>
        </section>

        <section class="settings">
          <div class="settings-button">
            <svg class="settings-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M19.14,12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24,0-.43.17-.47.41l-.36,2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47,0-.59.22L2.74,8.87c-.12.21-.08.47.12.61l2.03,1.58c-.04.3-.06.63-.06.94s.02.64.06.94l-2.03,1.58c-.18.14-.23.41-.12.61l1.92,3.32c.12.22.37.29.59.22l2.39-.96c.5.38,1.03.7,1.62.94l.36,2.54c.05.24.24.41.48.41h3.84c.24,0,.44-.17.47-.41l.36-2.54c.59-.24,1.13-.56,1.62-.94l2.39.96c.22.08.47,0,.59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58ZM12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6,3.6,1.62,3.6,3.6-1.62,3.6-3.6,3.6Z"/>
            </svg>
            <h1>Settings</h1>
          </div>
        </section>

        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
        <div class="settings-sidebar" id="settings-sidebar">
          <div class="sidebar-header">
            <h2>Settings</h2>
            <button class="close-button" aria-label="Close settings">&times;</button>
          </div>
          <div class="settings-content">
            <label for="duration">Test duration</label>
            <select id="duration" name="duration">
              <option value="30">30 seconds</option>
              <option value="60">1 minute</option>
              <option value="90">1 minute 30 seconds</option>
              <option value="120">2 minutes</option>
            </select>
            <label for="difficulty-chooser">Difficulty</label>
            <select name="difficulty" id="difficulty-chooser">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
            <label for="theme-chooser">Theme</label>
            <select id="theme-chooser">
              <option value="light">Light Mode</option>
              <option value="dark" selected>Dark Mode</option>
              <option value="blue">Blue Sky</option>
              <option value="forest">Forest Mint</option>
              <option value="cyberpunk">Cyberpunk</option>
              <option value="sepia">Vintage Sepia</option>
            </select>
          </div>
        </div>
      </div>

      <section class="time-remaining">
        <p class="time-remaining-text" id="time-remaining-text">00:30</p>
      </section>

      <section class="typing-container">
        <div class="words-to-type" id="words-to-type">
          <div class="blinking-cursor"></div>
        </div>
      </section>

      <section class="test-stats" id="test-stats">
        <div class="stat-item">
          <label class="stat-label">Test Duration</label>
          <span class="test-time" id="test-time"></span>
        </div>
        <div class="stat-item">
          <label class="stat-label">WPM</label>
          <span class="wpm-count" id="wpm-count"></span>
        </div>
        <div class="stat-item">
          <label class="stat-label">Accuracy</label>
          <span class="accuracy-count" id="accuracy-count"></span>
        </div>
        <button class="retake-button" id="retake-button">Retake Test</button>
      </section>
    </main>
    <script type="module" src="random-words.js" defer></script>
    <script type="module" src="app.js" defer></script>
    <script type="module" src="settings.js" defer></script>
  </body>
</html>
