<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Test</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="topbar.css" />
    <link rel="stylesheet" href="settings-sidebar.css" />
  </head>
  <body>
    <main>
      <div class="top-bar">
        <section class="header">
          <h1 class="title">Typing Test</h1>3
          <p class="description">Test your typing speed and accuracy</p>
        </section>

        <section class="settings">
          <div class="settings-button">
            <img src="settings.png" alt="Settings icon" class="settings-icon">
            <h1>Settings</h1>
          </div>

        </section>

        <div class="settings-sidebar">
            <button class="close-button">&times;</button>
            <div class="settings-content">
              <label for="duration">Choose time:</label>
              <select id="duration" name="duration">
                <option value="30">30 seconds</option>
                <option value="60">1 minute</option>
                <option value="90">1 minute 30 seconds</option>
                <option value="120">2 minutes</option>
              </select>
            </div>
          </div>
      </div>

      <section class="typing-container">
        <div class="words-to-type" id="words-to-type">
          <div class="blinking-cursor"></div>
        </div>
      </section>

      <section class="stats">
        <p class="timer" id="timer"></p>
        <p class="wpm" id="wpm"></p>
        <p class="accuracy" id="accuracy"></p>
      </section>
    </main>
    <script type="module" src="app.js" defer></script>
    <script type="module" src="settings.js" defer></script>
  </body>
</html>
